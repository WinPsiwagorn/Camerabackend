name: Deploy to server via Cloudflare SSH

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run commands on remote via Cloudflare Tunnel
        uses: and-fm/cloudflared-ssh-action@v3
        with:
          host: ${{ secrets.HOST }}           # Cloudflare Tunnel hostname
          username: ${{ secrets.USER }}   # SSH user
          private_key_filename: "id_rsa"
          private_key_value: ${{ secrets.SSH_KEY }}
          
          # ถ้ามึงมี policy ให้เซ็ตด้วย
          service_token_id: ${{ secrets.CLOUDFLARE_CLIENT_ID }}
          service_token_secret: ${{ secrets.CLOUDFLARE_CLIENT_SECRET }}

          # คำสั่งที่มึงจะรันบน remote
          commands: |
            whoami
            pwd
            # git pull origin main
            # docker compose down
            # docker compose up -d
